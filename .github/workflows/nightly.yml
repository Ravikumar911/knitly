name: Nightly

on:
  schedule:
    - cron: "17 21 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-matrix:
    name: Node ${{ matrix.node }} Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    env:
      SLASHCASH_E2E: "1"
      SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
      SLASHCASH_DOCTOR_SKIP_GWS: "1"
      SLASHCASH_NO_OPEN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm architecture-smells
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm fixtures:check
      - run: pnpm bench
      - run: pnpm eval:gate
        env:
          SLASHCASH_EVAL_SKIP_MODEL: "1"
      - run: pnpm e2e:all

  bundle-smoke:
    name: Bundle Smoke
    runs-on: ubuntu-latest
    env:
      SLASHCASH_E2E: "1"
      SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
      SLASHCASH_DOCTOR_SKIP_GWS: "1"
      SLASHCASH_NO_OPEN: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:local
