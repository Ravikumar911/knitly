name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish slashcash
    runs-on: macos-latest
    env:
      SLASHCASH_E2E: "1"
      SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
      SLASHCASH_DOCTOR_SKIP_GWS: "1"
      SLASHCASH_NO_OPEN: "1"
      PACKAGE_DIR: packages/cli
      PACKAGE_NAME: slashcash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Validate tag version
        if: github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          test "v$VERSION" = "${GITHUB_REF_NAME}"
      - run: pnpm architecture-smells
      - run: pnpm typecheck
      - run: SLASHCASH_EVAL_SKIP_MODEL=1 pnpm eval:gate
      - run: pnpm pack:local
      - name: Generate SBOM
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm sbom --json > ../../slashcash-sbom.json
      - name: Attach checksum
        run: |
          TARBALL=$(ls "${PACKAGE_DIR}"/${PACKAGE_NAME}-*.tgz | head -n 1)
          shasum -a 256 "$TARBALL" > ${PACKAGE_NAME}.sha256
      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('{0}-release-bundle-{1}', env.PACKAGE_NAME, github.run_number) }}
          path: |
            ${{ env.PACKAGE_DIR }}/${{ env.PACKAGE_NAME }}-*.tgz
            ${{ env.PACKAGE_NAME }}.sha256
            slashcash-sbom.json
          if-no-files-found: error
      - name: Publish with provenance
        if: github.event_name == 'push'
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Smoke published package
        if: github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./${PACKAGE_DIR}/package.json').version")
          OUTPUT=$(npx -y "${PACKAGE_NAME}@$VERSION" --version)
          test "$OUTPUT" = "$VERSION"
      - name: Create GitHub release
        if: github.event_name == 'push'
        run: |
          TARBALL=$(ls "${PACKAGE_DIR}"/${PACKAGE_NAME}-*.tgz | head -n 1)
          gh release create "${GITHUB_REF_NAME}" "$TARBALL" "${PACKAGE_NAME}.sha256" slashcash-sbom.json --title "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Release rehearsal summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Dry run complete."
          echo "The packaged tarball, checksum, and SBOM were uploaded as workflow artifacts."
          echo "Push a vX.Y.Z tag to publish ${PACKAGE_NAME} to npm and create the GitHub release."
