name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SLASHCASH_E2E: "1"
  SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
  SLASHCASH_DOCTOR_SKIP_GWS: "1"
  SLASHCASH_NO_OPEN: "1"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure isolated slash.cash state
        run: |
          echo "SLASHCASH_HOME=${RUNNER_TEMP}/slashcash-home" >> "$GITHUB_ENV"
          echo "SQLITE_DB_PATH=${RUNNER_TEMP}/slashcash-home/db.sqlite" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Resolve desktop version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved @knitly/desktop@${VERSION}."
      - name: Validate tag version
        if: github.event_name == 'push'
        run: test "v${{ steps.version.outputs.version }}" = "${GITHUB_REF_NAME}"
      - run: pnpm architecture-smells
      - run: pnpm typecheck
      - run: pnpm --filter @knitly/website build
      - run: SLASHCASH_EVAL_SKIP_MODEL=1 pnpm eval:gate
      - name: CLI runtime bundle smoke
        run: pnpm bundle:runtime
      - name: Release rehearsal summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Dry run preflight complete for desktop v${{ steps.version.outputs.version }}."
          echo "macOS pack artifacts will upload from the build-macos job."
          echo "Push v${{ steps.version.outputs.version }} to create the GitHub Release and deploy the website."

  build-macos:
    name: Pack macOS arm64
    needs: [preflight]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure isolated slash.cash state
        run: |
          echo "SLASHCASH_HOME=${RUNNER_TEMP}/slashcash-home" >> "$GITHUB_ENV"
          echo "SQLITE_DB_PATH=${RUNNER_TEMP}/slashcash-home/db.sqlite" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pack unsigned macOS arm64
        run: pnpm desktop:pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64-${{ needs.preflight.outputs.version }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error
      - name: Dry-run pack summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Dry run pack complete for desktop v${{ needs.preflight.outputs.version }}."
          echo "Artifacts uploaded; no GitHub Release or website deploy on workflow_dispatch."
          echo "Push v${{ needs.preflight.outputs.version }} to create the GitHub Release and deploy the website."

  create-release:
    name: Create GitHub Release
    needs: [preflight, build-macos]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-arm64-${{ needs.preflight.outputs.version }}
          path: release-assets
      - name: Create GitHub release
        run: |
          shopt -s nullglob
          ASSETS=(release-assets/*.dmg release-assets/*.zip release-assets/latest-mac.yml release-assets/*.blockmap)
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No desktop release assets found."
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-website:
    name: Publish website
    needs: [preflight, create-release]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: website-production
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build website
        run: pnpm --filter @knitly/website build
      - name: Skip website publish when Vercel secrets are missing
        if: env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' || env.VERCEL_TOKEN == ''
        run: |
          echo "Skipping website publish because VERCEL_ORG_ID, VERCEL_PROJECT_ID, or VERCEL_TOKEN is not configured."
      - name: Publish website to Vercel
        if: env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.VERCEL_TOKEN != ''
        working-directory: apps/website
        run: |
          pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
