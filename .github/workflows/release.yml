name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency: release-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish slashcash
    runs-on: macos-latest
    env:
      SLASHCASH_E2E: "1"
      SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
      SLASHCASH_DOCTOR_SKIP_GWS: "1"
      SLASHCASH_NO_OPEN: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Validate tag version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          test "v$VERSION" = "${GITHUB_REF_NAME}"
      - run: pnpm architecture-smells
      - run: pnpm typecheck
      - run: SLASHCASH_EVAL_SKIP_MODEL=1 pnpm eval:gate
      - run: pnpm pack:local
      - name: Generate SBOM
        working-directory: packages/cli
        run: npm sbom --json > ../../slashcash-sbom.json
      - name: Publish with provenance
        working-directory: packages/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Smoke published package
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          OUTPUT=$(npx -y "slashcash@$VERSION" --version)
          test "$OUTPUT" = "$VERSION"
      - name: Attach checksum
        run: |
          TARBALL=$(ls packages/cli/slashcash-*.tgz | head -n 1)
          shasum -a 256 "$TARBALL" > slashcash.sha256
          gh release create "${GITHUB_REF_NAME}" "$TARBALL" slashcash.sha256 slashcash-sbom.json --title "${GITHUB_REF_NAME}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
