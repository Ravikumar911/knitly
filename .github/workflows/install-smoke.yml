name: Install Smoke

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SLASHCASH_E2E: "1"
  SLASHCASH_DOCTOR_SKIP_OLLAMA: "1"
  SLASHCASH_DOCTOR_SKIP_GWS: "1"
  SLASHCASH_NO_OPEN: "1"

jobs:
  pack-install:
    name: Runtime bundle smoke
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure isolated slash.cash state
        run: |
          echo "SLASHCASH_HOME=${RUNNER_TEMP}/slashcash-home" >> "$GITHUB_ENV"
          echo "SQLITE_DB_PATH=${RUNNER_TEMP}/slashcash-home/db.sqlite" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: CLI runtime bundle smoke
        run: pnpm bundle:runtime
