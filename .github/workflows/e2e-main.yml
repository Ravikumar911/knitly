name: E2E Tests - Main App

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/main/**'
      - 'apps/e2e-main/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-main:
    name: E2E Tests (Main App)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Add any environment variables needed for your app
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e-main run install-browsers

      - name: Build main app
        run: pnpm --filter main build

      - name: Start main app
        run: |
          pnpm --filter main start &
          # Wait for the server to be ready
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          PORT: 3000

      - name: Run E2E tests
        run: pnpm --filter e2e-main test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-main
          path: |
            apps/e2e-main/test-results/
            apps/e2e-main/playwright-report/
          retention-days: 7

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-main
          path: apps/e2e-main/test-results/screenshots/
          retention-days: 7