[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slashcash-pdf-extractor"
version = "0.1.0"
description = "Local PDF extraction contract for slash.cash"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2,<3",
  "pymupdf==1.27.2.3",
  "pdfplumber==0.11.9",
]

[project.optional-dependencies]
docling = ["docling>=2.91.0,<3"]
dev = [
  "pytest>=8,<9",
  "ruff>=0.11,<1",
  "mypy>=1,<2",
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
